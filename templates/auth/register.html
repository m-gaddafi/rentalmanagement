{% extends 'base.html' %}

{% block title %}Register - RMS{% endblock %}

{% block content %}
<article style="max-width: 500px; margin: 2rem auto;">
    <h3>Create an Account</h3>
    <p style="color: #666; font-size: 0.9rem;">Register as a Tenant to manage your rentals.</p>
    
    {% if error %}
        <p style="color: #c52f24;"><strong>{{ error }}</strong></p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <!-- Names -->
        <div class="grid">
            <div>
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" placeholder="John" required>
            </div>
            <div>
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" placeholder="Doe" required>
            </div>
        </div>

        <!-- Account Credentials -->
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="johndoe" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>

        <!-- Model Aligned Fields (Optional but supported by your CustomUser) -->
        <div class="grid">
            <div>
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="+256...">
            </div>
            <div>
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="Kampala">
            </div>
        </div>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit">Sign Up</button>
    </form>
</article>
{% endblock %}
